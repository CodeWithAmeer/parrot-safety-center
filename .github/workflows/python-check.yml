name: Python check

on:
  push:
  pull_request:

jobs:
  static-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile source
        run: python -m compileall src parrot_safety_center.py
      - name: Run static safety tests
        run: python tests/test_static_safety.py
